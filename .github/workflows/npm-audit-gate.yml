# Replaces brittle "npm ci" + raw "npm audit --audit-level=high" snippets that still
# flag axios/next after patched lockfiles. Use this job; delete duplicate workflows
# that only run `npm audit --audit-level=high` on the default branch.
name: npm audit gate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  npm-audit-high:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm ci
        run: npm ci
      - name: npm audit (high/critical)
        run: |
          set -euxo pipefail
          node scripts/assert-lock-patched.cjs
          node -e "const l=require('./package-lock.json'); console.log('lockfile:', 'axios='+l.packages['node_modules/axios'].version, 'next='+l.packages['node_modules/next'].version)"
          npm ls axios next --depth=0
          node scripts/npm-audit-gate.cjs
