name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

# Parallel backend + frontend (scripts/verify-*.sh); informational audits. Gate job: verify.
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key-must-be-32chars-minimum
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Backend verification
        run: bash scripts/verify-backend.sh

  frontend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key-must-be-32chars-minimum
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend verification
        run: bash scripts/verify-frontend.sh

  verify:
    runs-on: ubuntu-latest
    needs: [secret-scan, backend, frontend]
    steps:
      - name: All required checks passed
        run: echo "secret-scan, backend, and frontend verification succeeded."

  mypy-full-report:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SECRET_KEY: ci-test-secret-key-must-be-32chars-minimum
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-tools.txt
      - name: Mypy (full app)
        run: python -m mypy --config-file mypy-full.ini app

  backend-security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit tooling
        run: |
          pip install -r requirements.txt
          pip install pip-audit
      - name: pip-audit (high/critical report)
        run: python -m pip_audit

  # npm high/critical gate runs inside scripts/verify-frontend.sh (frontend job) so there is
  # a single audit path. A separate job named "npm audit (high/critical)" is a common stale
  # duplicate in forks; remove it from this workflow to avoid two conflicting definitions.
