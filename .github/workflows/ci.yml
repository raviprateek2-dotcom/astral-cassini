name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          
      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pytest
        env:
          SECRET_KEY: test-secret-key-at-least-32-characters-long
          DATABASE_URL: sqlite:///./test.db
        run: |
          cd backend
          python -m pytest tests/ -v

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install Dependencies
        run: |
          cd frontend
          npm install
          
      - name: Lint
        run: |
          cd frontend
          npm run lint
          
      - name: Build
        run: |
          cd frontend
          npm run build
