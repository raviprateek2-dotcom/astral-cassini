name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key-must-be-32chars-minimum
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-tools.txt
      - name: Ruff
        run: python -m ruff check app tests
      - name: Mypy (core modules)
        run: python -m mypy
      - name: Backend tests
        run: pytest tests -q --tb=short

  # Full-app typing debt tracker — does not block merges (ORM/LLM stubs are noisy).
  mypy-full-report:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SECRET_KEY: ci-test-secret-key-must-be-32chars-minimum
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-tools.txt
      - name: Mypy (full app)
        run: python -m mypy --config-file mypy-full.ini app

  backend-security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit tooling
        run: |
          pip install -r requirements.txt
          pip install pip-audit
      - name: pip-audit (high/critical report)
        run: python -m pip_audit

  frontend-security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high/critical)
        run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Run frontend tests
        run: npm test -- --ci --passWithNoTests
      - name: Build frontend
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
