# Matches the common GitHub "Node.js" template shape (npm ci → audit) but the audit
# step uses assert-lock-patched + npm-audit-gate instead of raw npm audit.
name: Node.js CI

on:
  push:
    branches:
      - main
      - master
      - "cursor/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit --audit-level=high
        run: |
          set -euxo pipefail
          node scripts/assert-lock-patched.cjs
          npm ls axios next --depth=0 || true
          node scripts/npm-audit-gate.cjs
